# PLAY level variables
- name: variables from PLAY level
  hosts: localhost
  vars:
    Course: "DevOps"
    student: "dileep"
    Duration: "110HRS"
    Trainer: "subhash"
  tasks:
     - name: check variables
       ansible.builtin.debug:
                 msg: "Hi, I am learning {{ Course }}, trainer is {{ trainer }}, student name is {{ student }}, duration is {{ Duration }}"
      